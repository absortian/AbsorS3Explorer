name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac-arm64
          - os: macos-13
            build_cmd: npm run build:mac-x64
          - os: windows-latest
            build_cmd: npm run build:win
          - os: ubuntu-latest
            build_cmd: npm run build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body: |
            ## Absor S3 Explorer ${{ github.ref_name }} 🚀

            Explorador de archivos dual-panel para transferir archivos entre el sistema de archivos local y almacenamiento compatible con S3 (AWS S3, MinIO, DigitalOcean Spaces, etc.).

            ### Características
            - Explorador local y S3 en paneles duales
            - Arrastrar y soltar para transferencias entre paneles
            - Gestión de conexiones S3 persistentes
            - Cola de transferencias en tiempo real con progreso
            - Soporte para cualquier almacenamiento compatible con S3

            ### Descargas
            | Plataforma | Archivo |
            |---|---|
            | macOS (Apple Silicon) | `.dmg` o `.zip` (arm64) |
            | macOS (Intel) | `.dmg` o `.zip` (x64) |
            | Windows | `-setup.exe` |
            | Linux (Debian/Ubuntu) | `.deb` |
            | Linux (Fedora/RHEL) | `.rpm` |
            | Linux (Universal) | `.AppImage` |
            | Linux (Genérico) | `.tar.gz` |
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.blockmap
            dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
